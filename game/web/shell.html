<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>$GODOT_PROJECT_NAME</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: #dff6f5;
	background-color: #302c2e;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status {
	top: 0;
	bottom: 0;
	background-color: $GODOT_SPLASH_COLOR;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#loading-sprite, #status-progress, #status-notice {
	display: none;
}

#loading-sprite {
	width: 16px;
	height: 16px;
	margin-bottom: 1.5rem;
	background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAABw0lEQVR4nO2br27DMBDG3WlwfZSysZUN9AFGBipNA2FDfYA9QjU+EEUqzQOEB5blURqeIW+J47P89+Ku30+qoir6fHeOnfrOrhAAAKBht9kOS+q5uDPd3G22g/zwufRnm0N/T92oy0IcTxdx2K/F8XQRTdcGOdF07SpHvXEEHPbrydWFuizE0/Pr7zVXPdmr6hByfQL9uZroHx7fstQbp8DL+/ekQVcnQvRjrQ+2enIKqA2EBO+jr8ti8l19orH0Wqd0b1CXKXDtegAAAADcBkkWQrIN38UHp/1ZLiCF/bkalkiHue2TTsXIxsYBfH59sGeDNvat0+G6LJycCA2AKx3XpsP9uRpiZ4O+qGl5bPvadNg1WAo1JfUhVkdSaDsgdPhJfJ2PYd+288lfAVeDsYhlP/XIAQAAAMA/5lbOByTbHI21nE4NuTe49PY2F9HPB4zzcFXvusHJwWxY6moBEtuiCDX/c5wGsxFABdh07cq2TpBjoBTaKZAigFw7xfgOkPg4P9bkGjwAAAAAANARUtC4lmKIQEEEBZG0J0RC9FyQ/xfgOq+/NMbzAXVZeB1y0OlzfTHOhqXJUZeTXqFtAAAABz+aR2OS89A/3wAAAABJRU5ErkJggg==");
	background-repeat: no-repeat;
	background-position: 0 0;
	image-rendering: pixelated;
	transform: scale(6);
	animation: loading-sprite-anim 0.8s steps(4) infinite;
}

@keyframes loading-sprite-anim {
	from { background-position-x: 0; }
	to { background-position-x: -64px; }
}

#status-progress {
	bottom: 10%;
	width: 50%;
	max-width: 20rem;
	height: 0.9rem;
	margin: 0 auto;
	background-color: #39314b;
	border: 3px solid #302c2e;
	box-shadow: 0 0 0 2px #5a5353;
	border-radius: 0;
	overflow: hidden;
	image-rendering: pixelated;
}

#status-progress-fill {
	height: 100%;
	width: 0%;
	background-color: #eea160;
	transition: width 0.1s steps(6);
}

#status-progress.indeterminate #status-progress-fill {
	width: 40% !important;
	animation: status-progress-indeterminate 1.1s steps(10) infinite;
	transition: none;
}

@keyframes status-progress-indeterminate {
	0% { margin-left: 0%; }
	100% { margin-left: 100%; }
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

#fullscreen-button {
	position: absolute;
	right: 12px;
	bottom: 12px;
	width: 40px;
	height: 40px;
	padding: 0;
	background-color: rgba(0, 0, 0, 0.5);
	border: 1px solid rgba(255, 255, 255, 0.5);
	border-radius: 0.4rem;
	color: white;
	cursor: pointer;
	z-index: 2;
}

#fullscreen-button:hover {
	background-color: rgba(0, 0, 0, 0.75);
}

#fullscreen-button svg {
	width: 22px;
	height: 22px;
	fill: none;
	stroke: white;
	stroke-width: 2;
	pointer-events: none;
}
		</style>
		$GODOT_HEAD_INCLUDE
	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<div id="loading-sprite"></div>
			<div id="status-progress">
				<div id="status-progress-fill"></div>
			</div>
			<div id="status-notice"></div>
		</div>

		<button id="fullscreen-button" title="Toggle fullscreen">
			<svg viewBox="0 0 24 24"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>
		</button>

		<script src="$GODOT_URL"></script>
		<script>
const GODOT_CONFIG = $GODOT_CONFIG;
const GODOT_THREADS_ENABLED = $GODOT_THREADS_ENABLED;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const loadingSprite = document.getElementById('loading-sprite');
	const statusProgress = document.getElementById('status-progress');
	const statusProgressFill = document.getElementById('status-progress-fill');
	const statusNotice = document.getElementById('status-notice');
	const fullscreenButton = document.getElementById('fullscreen-button');
	const canvas = document.getElementById('canvas');

	fullscreenButton.addEventListener('click', function () {
		if (document.fullscreenElement) {
			document.exitFullscreen();
		} else if (canvas.requestFullscreen) {
			canvas.requestFullscreen();
		}
	});

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		loadingSprite.style.display = mode === 'progress' ? 'block' : 'none';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.classList.remove('indeterminate');
					statusProgressFill.style.width = ((current / total) * 100) + '%';
				} else {
					statusProgress.classList.add('indeterminate');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
		}, displayFailureNotice);
	}
}());
		</script>
	</body>
</html>
