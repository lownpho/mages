# Biome catalogue — design source of truth.
#
# Canonical data for every (implemented) biome. `design/tools/build.py` renders it
# into design/docs/biomes.md (the section between the GENERATED markers).
#
# Edit biomes HERE, then run:  python3 design/tools/build.py
# Do NOT hand-edit the generated section of biomes.md.
#
# Only shipped biomes belong in this file. Proposals stay in the hand-written
# "ideas" section of biomes.md, out of the generated region.
#
# Biome membership lives here, not in enemies.yaml: each biome's `roster` names
# the enemies (defined in enemies.yaml) that belong to it. The per-enemy "<biome>
# drops" table is NOT authored here either — it is generated by looking each roster
# enemy up in enemies.yaml, so each enemy's drops have one home. The per-sub-biome
# `drops` summary line below is an authored design highlight, a curated subset, not
# the exhaustive table.
#
# Per biome:
#   id / name / tier_label / intro (the biomes-page blurb)
#   enemies_intro : the blurb atop this biome's section on the enemies page
#   roster        : ordered enemy names; a boss entry is {name, sub_biome}
#   spawn_with    : items the player starts the biome with
#   notation      : the "Notation:" legend line for the room tables
#   sub_biomes    : each with intro, optional roster line, a room table, drops summary
# Room table rows: {tier, room, groups} — `groups` is the raw "- / + / x" cell.

biomes:
  - id: glade
    name: Glade
    tier_label: T1/T2
    intro: >
      The opening biome, where the player learns the systems and fills out a first kit. Enemy
      density is low, variety is high, stakes are gentle. It has two sub-biomes: the starting glade,
      which is pure onboarding, and the veggie glade, which brings in the plant roster and its boss.
    # The biome's enemy roster: which enemies (defined in enemies.yaml) belong here,
    # in the order the enemies-page section and the drops table list them. A boss
    # entry names the sub-biome it caps, for its "*(boss, ...)*" header.
    enemies_intro: >
      The opening biome. It comes in two flavours: the floral **starting glade**, capped by the
      **fae**, and the rooted **veggie glade**, capped by the **thornmess**.
    roster:
      - sproutling
      - hopper
      - wasp
      - mandrake
      - seedling
      - dirt golem
      - thornthrower
      - rosebud
      - viper
      - mandraker
      - {name: fae, sub_biome: starting glade}
      - {name: thornmess, sub_biome: veggie glade}
    spawn_with: [Fireball T1, Heal T1, Blam T1]
    notation: >
      Notation: `Nx` count, `+` means "together in the room", `-` separates the variations the
      generator may roll for that room (it picks one).
    sub_biomes:
      - name: Starting glade
        intro: >
          Onboarding: single-enemy rooms first, small mixed groups by T2, then the biome's rare and boss at T3.
        rooms:
          - {tier: T0, room: open,    groups: "*(empty)*"}
          - {tier: T0, room: scatter, groups: "*(empty)*"}
          - {tier: T1, room: open,    groups: "*(empty)*"}
          - {tier: T1, room: scatter, groups: "2x sproutling - 3x hopper - 2x hopper + 1x sproutling"}
          - {tier: T1, room: open,    groups: "3x sproutling - 4x hopper - 2x sproutling + 2x hopper"}
          - {tier: T1, room: blob,    groups: "2x sproutling + 2x wasp - 1x sproutling + 3x wasp"}
          - {tier: T1, room: scatter, groups: "1x dirt golem"}
          - {tier: T2, room: scatter, groups: "*(empty)*"}
          - {tier: T2, room: scatter, groups: "3x wasp - 3x hopper - 2x hopper + 2x wasp"}
          - {tier: T2, room: scatter, groups: "2x mandrake - 1x mandrake + 2x hopper - 2x wasp + 2x sproutling"}
          - {tier: T2, room: blob,    groups: "1x dirt golem + 2x wasp - 1x dirt golem + 2x hopper"}
          - {tier: T2, room: open,    groups: "2x seedling + 2x wasp - 1x seedling + 1x dirt golem"}
          - {tier: T2, room: open,    groups: "2x mandrake + 1x seedling - 2x mandrake + 2x sproutling"}
          - {tier: T3, room: blob,    groups: "1x dirt golem + 2x wasp + 1x mandrake - 1x dirt golem + 2x mandrake + 1x seedling"}
          - {tier: T3, room: open,    groups: "1x dirt golem + 2x hopper + 1x mandrake - 2x mandrake + 2x seedling"}
          - {tier: T3, room: open,    groups: "1x viper *(rare)*"}
          - {tier: T3, room: blob,    groups: "1x mandraker *(rare)*"}
          - {tier: T3, room: boss,    groups: "1x fae"}
          - {tier: T3, room: blob,    groups: "door to deepwood *(unique)*"}
        drops: [Zaap T1, Pew T1, Nope T1, Bzzz T1, Ring T1, Fireball T2, Blam T2]

      - name: Veggie glade
        intro: >
          Brings in the plant roster: thornthrower and rosebud both show up from T1. Groups get denser
          and harder than the starting glade by T2. T3 keeps the shared rare pair (1x viper,
          1x mandraker) and the biome boss.
        roster: "thornthrower, rosebud, thornmess *(boss)*."
        rooms:
          - {tier: T0, room: open,    groups: "2x sproutling - 3x hopper"}
          - {tier: T0, room: scatter, groups: "1x sproutling + 1x hopper - 2x hopper"}
          - {tier: T1, room: open,    groups: "3x sproutling - 2x hopper + 1x thornthrower"}
          - {tier: T1, room: scatter, groups: "2x thornthrower - 3x sproutling - 1x thornthrower + 2x hopper"}
          - {tier: T1, room: open,    groups: "2x rosebud - 2x thornthrower + 1x rosebud - 3x sproutling + 1x thornthrower"}
          - {tier: T1, room: blob,    groups: "1x rosebud + 2x wasp - 2x thornthrower + 2x hopper"}
          - {tier: T1, room: scatter, groups: "1x dirt golem + 1x thornthrower"}
          - {tier: T2, room: scatter, groups: "4x thornthrower - 3x thornthrower + 1x rosebud"}
          - {tier: T2, room: scatter, groups: "2x rosebud + 2x wasp - 2x mandrake + 2x thornthrower"}
          - {tier: T2, room: blob,    groups: "1x dirt golem + 3x thornthrower - 1x dirt golem + 2x rosebud"}
          - {tier: T2, room: open,    groups: "2x seedling + 2x thornthrower - 2x rosebud + 1x dirt golem"}
          - {tier: T2, room: open,    groups: "3x mandrake + 2x rosebud - 2x thornthrower + 2x seedling + 1x rosebud"}
          - {tier: T3, room: blob,    groups: "1x dirt golem + 2x rosebud + 1x thornthrower + 1x mandrake - 1x dirt golem + 2x mandrake + 1x seedling"}
          - {tier: T3, room: open,    groups: "2x thornthrower + 2x seedling + 1x rosebud - 1x dirt golem + 2x mandrake + 1x rosebud"}
          - {tier: T3, room: open,    groups: "1x viper *(rare)*"}
          - {tier: T3, room: blob,    groups: "1x mandraker *(rare)*"}
          - {tier: T3, room: boss,    groups: "1x thornmess"}
          - {tier: T3, room: blob,    groups: "door to deepwood *(unique)*"}
        drops: [snipe T1, Ring T2, Jimmy T2]
