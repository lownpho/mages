# Spell catalogue — design source of truth.
#
# This file is the canonical data for every spell. `design/tools/build.py`
# renders it into:
#   - design/docs/spells.md   (the Catalogue section, between the GENERATED markers)
#   - design/docs/spells.html (the interactive, filterable design view)
#
# Edit spells HERE, then run:  python3 design/tools/build.py
# Do NOT hand-edit the generated Catalogue in spells.md or the .html.
#
# Structure: `spells` is a flat list — each spell names the `category` it belongs
# to (see `categories` below for the label + blurb of each). The category order
# in `categories` is the order sections appear in the rendered docs.
#
# Field vocabulary (kept faithful to the design doc so the values read the same
# way in the tables). `ordered_scales` below tells the tooling how to sort them.

ordered_scales:
  magnitude:   [low, med, high, "very high"]         # grants strength
  range:       ["very low", low, med, high, "very high", self]
  cooldown:    ["very low", low, med, high, "very high"]
  cast_time:   [instant, "very low", low, med, high]

holds:
  "no":        Fire-and-forget — press launches the effect and frees you at once; effects stack.
  channeled:   Hold the button and it holds you — rooted until release, cooldown, or the time cap.
  charged:     A hold you keep moving through — build power, then release a single payload.

categories:
  - id: dps
    name: DPS
    description: >
      The primary-damage core: hold-to-fire spells that loose a burst then cool
      down, the player's mirror of an enemy attack.
  - id: nukes
    name: Nukes
    description: >
      Long cooldown, big single payload.
  - id: summon
    name: Summon
    description: >
      Minions you cast into the fight — they run their own AI and keep working while
      you move and cast other things.
  - id: utility
    name: Utility
    description: >
      Everything that isn't raw damage or a summon: mobility, buffs, crowd control,
      denial, and mitigation. Some are instant and layer on top of your damage; others
      are channeled or charged holds that trade a slot of offence to shape or survive
      the fight.

spells:
